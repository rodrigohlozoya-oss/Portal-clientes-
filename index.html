<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fumichisa | Control Estructural de Plagas</title>
    <style>
        :root {
            --verde: #2A8C3F;
            --negro: #1A1A1A;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            border-top: 8px solid var(--verde);
        }
        img {
            max-width: 250px;
            margin-bottom: 20px;
        }
        h1 {
            color: var(--negro);
            font-size: 24px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-ws {
            background-color: var(--verde);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
        }
        .btn-ws:hover {
            background-color: var(--negro);
        }
        .locations {
            margin-top: 30px;
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Fumichisa Logo">
        <h1>Expertos en Erradicación</h1>
        <p>Estamos actualizando nuestro portal para ofrecerte protocolos de blindaje estructural de última generación. Nuestra prioridad es tu seguridad sanitaria.</p>
        
        <a href="https://wa.me/5214421234567" class="btn-ws">SOLICITAR COTIZACIÓN POR WHATSAPP</a>
        
        <div class="locations">
            Querétaro | Valle de Bravo | Chihuahua
        </div>
    </div>
</body>
</html>
