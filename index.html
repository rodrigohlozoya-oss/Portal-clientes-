<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fumichisa | Bioseguridad y Control Estructural</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --verde: #2A8C3F;
            --verde-oscuro: #1A5C27;
            --negro: #111111;
            --gris: #F8F9FA;
            --texto: #4A5568;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--texto); background-color: #fff; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Montserrat', sans-serif; color: var(--negro); }

        /* HERO - PANTALLA DIVIDIDA PREMIUM */
        .hero { display: flex; min-height: 100vh; }
        
        .hero-content { 
            flex: 1; 
            padding: 8% 8%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            background-color: #ffffff;
        }
        
        /* EL TRUCO PARA INTEGRAR EL LOGO PERFECTAMENTE */
        .logo-main { 
            max-width: 250px; 
            margin-bottom: 50px; 
            mix-blend-mode: multiply; /* Esto borra el fondo blanco del logo */
            filter: contrast(1.1); /* Realza los colores */
        }

        .hero-content h1 { font-size: 3.5rem; font-weight: 900; line-height: 1.1; margin-bottom: 25px; text-transform: uppercase; letter-spacing: -2px; }
