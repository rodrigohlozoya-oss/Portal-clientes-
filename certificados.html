<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Certificados | Fumichisa</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="page-header">
        <h1>Portal de Clientes</h1>
        <p>Consulta, descarga y verifica tus certificados de bioseguridad estructural al instante.</p>
    </section>

    <section class="portal-section">
        <div class="portal-wrapper">
            <i class="fas fa-file-contract portal-icon"></i>
            <h2>Buscar Documentación</h2>
            <p>Ingresa tu número de folio o el RFC de tu empresa para acceder a tu expediente seguro.</p>
            
            <form class="portal-form" id="form-certificados" onsubmit="event.preventDefault();">
                <input type="text" id="input_busqueda" placeholder="Ej. FUM-1024 o RFC" required>
                <button type="submit" class="btn-primary" id="btn_buscar">
                    <i class="fas fa-search"></i> Consultar Certificado
                </button>
            </form>

            <div id="resultado-busqueda" style="display: none; margin-top: 30px;">
                </div>
        </div>
    </section>
<script>
        document.getElementById('form-certificados').addEventListener('submit', function(e) {
            e.preventDefault();
            var input = document.getElementById('input_busqueda').value;
            var btn = document.getElementById('btn_buscar');
            var resultado = document.getElementById('resultado-busqueda');

            // Cambiamos el diseño del botón mientras busca
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Buscando...';
            btn.disabled = true;
            btn.style.opacity = '0.7';

            // 🔴 PEGA TU URL DE APPS SCRIPT AQUÍ ABAJO 🔴
            var urlWebApp = https://script.google.com/macros/s/AKfycbwgrEm9C-vO8u4lWvo24X2rTLCBGt61jjhUL279JyOWlGVoQ0rZLqK3BQt2iOfyfIKp/exec;

            var formData = new FormData();
            formData.append('busqueda', input);

            fetch(urlWebApp, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                // Regresamos el botón a la normalidad
                btn.innerHTML = '<i class="fas fa-search"></i> Consultar Certificado';
                btn.disabled = false;
                btn.style.opacity = '1';

                if(data.success) {
                    resultado.style.display = 'block';
                    resultado.innerHTML = `
                        <div style="background-color: #f0fdf4; border: 1px solid #bbf7d0; padding: 25px; border-radius: 8px; margin-top: 20px;">
                            <h3 style="color: #166534; margin-bottom: 10px; font-size: 1.2rem;">¡Expediente Encontrado!</h3>
                            <p style="color: #15803d; margin-bottom: 20px;">Hemos localizado tu historial de servicios MIP.</p>
                            <a href="${data.url}" class="btn-primary" style="display: inline-flex; text-decoration: none;">
                                <i class="fas fa-external-link-alt"></i> Acceder a mi Portal VIP
                            </a>
                        </div>
                    `;
                } else {
                    resultado.style.display = 'block';
                    resultado.innerHTML = `
                        <div style="background-color: #fef2f2; border: 1px solid #fecaca; padding: 20px; border-radius: 8px; margin-top: 20px;">
                            <p style="color: #991b1b; margin: 0; font-weight: 500;">No encontramos certificados para ese folio o cliente. Verifica tus datos e intenta de nuevo.</p>
                        </div>
                    `;
                }
            })
            .catch(error => {
                btn.innerHTML = '<i class="fas fa-search"></i> Consultar Certificado';
                btn.disabled = false;
                resultado.style.display = 'block';
                resultado.innerHTML = '<p style="color: #991b1b; margin-top: 20px;">Hubo un error de conexión con el servidor. Intenta de nuevo.</p>';
            });
        });
    </script>
    </body>
</html>
